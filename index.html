<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仏壇部材管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Meiryo', sans-serif; background: #f5f0eb; color: #333; }

  header {
    background: #4a3728;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.2rem; }
  header .breadcrumb { font-size: 0.85rem; opacity: 0.8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

  /* ページ切り替え */
  .page { display: none; }
  .page.active { display: block; }

  /* 製品一覧 */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .product-card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    cursor: pointer;
    border-left: 4px solid #8b6f47;
    transition: transform 0.15s;
  }
  .product-card:hover { transform: translateY(-2px); }
  .product-card h3 { font-size: 1rem; margin-bottom: 4px; }
  .product-card .meta { font-size: 0.8rem; color: #888; }

  .add-card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
    border: 2px dashed #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 0.95rem;
    gap: 8px;
    transition: border-color 0.15s;
  }
  .add-card:hover { border-color: #8b6f47; color: #8b6f47; }

  /* ボタン */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-primary { background: #8b6f47; color: #fff; }
  .btn-primary:hover { background: #6e5538; }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-danger:hover { background: #962d22; }
  .btn-ghost { background: transparent; border: 1px solid #ccc; color: #555; }
  .btn-ghost:hover { background: #f0f0f0; }
  .btn-pdf { background: #2c6fad; color: #fff; }
  .btn-pdf:hover { background: #245a8e; }

  /* ツールバー */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar h2 { flex: 1; font-size: 1.1rem; }

  /* パーツテーブル */
  .parts-table-wrap { overflow-x: auto; margin-top: 4px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    font-size: 0.88rem;
  }
  thead tr { background: #4a3728; color: #fff; }
  th, td { padding: 8px 10px; border-bottom: 1px solid #eee; white-space: nowrap; }
  td { vertical-align: middle; }
  tbody tr:hover { background: #fdf8f4; }
  tbody tr:last-child td { border-bottom: none; }

  .col-name { min-width: 90px; font-weight: bold; }
  .col-dim { min-width: 60px; text-align: center; }
  .col-note { min-width: 120px; }

  /* セクション区切り */
  .section-header {
    background: #d4c4b0 !important;
    color: #4a3728;
    font-weight: bold;
  }

  /* インライン編集 */
  input[type="text"], input[type="number"], textarea, select {
    font-family: inherit;
    font-size: 0.88rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 6px;
    width: 100%;
  }
  input[type="number"] { width: 70px; }
  textarea { resize: vertical; min-height: 40px; }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    width: 400px;
    max-width: 95vw;
  }
  .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* 備考エリア */
  .memo-area {
    background: #fff;
    border-radius: 8px;
    padding: 12px 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    margin-top: 16px;
  }
  .memo-area label { font-size: 0.85rem; color: #666; display: block; margin-bottom: 6px; }
  .memo-area textarea { width: 100%; height: 60px; }

  /* 印刷 */
  @media print {
    header, .toolbar .btn, .no-print { display: none !important; }
    body { background: #fff; }
    .container { padding: 0; max-width: 100%; }
    table { box-shadow: none; font-size: 0.8rem; }
    th, td { padding: 5px 7px; }
    .memo-area { box-shadow: none; border: 1px solid #ccc; }
    .print-title { display: block !important; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
  }
  .print-title { display: none; }
</style>
</head>
<body>

<header>
  <h1>仏壇部材管理</h1>
  <span class="breadcrumb" id="breadcrumb"></span>
</header>

<!-- 製品一覧ページ -->
<div class="page active" id="page-list">
  <div class="container">
    <div class="toolbar" style="margin-top:16px;">
      <h2>製品一覧</h2>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </div>
</div>

<!-- 製品詳細ページ -->
<div class="page" id="page-detail">
  <div class="container">
    <div class="print-title" id="print-title"></div>
    <div class="toolbar no-print">
      <button class="btn btn-ghost" onclick="showList()">← 一覧に戻る</button>
      <h2 id="detail-title"></h2>
      <button class="btn btn-primary" onclick="openAddPartModal()">＋ パーツ追加</button>
      <button class="btn btn-pdf" onclick="printPDF()">PDF出力</button>
      <button class="btn btn-danger" onclick="deleteProduct()">製品削除</button>
    </div>

    <div class="parts-table-wrap">
      <table id="parts-table">
        <thead>
          <tr>
            <th class="col-name">パーツ名</th>
            <th colspan="4" style="text-align:center; border-left:2px solid #6e5538;">正規寸法</th>
            <th colspan="4" style="text-align:center; border-left:2px solid #6e5538;">杢貼り用寸法</th>
            <th colspan="4" style="text-align:center; border-left:2px solid #6e5538;">荒取り寸法</th>
            <th class="col-note" style="border-left:2px solid #6e5538;">備考</th>
            <th class="no-print"></th>
          </tr>
          <tr style="background:#6e5538;">
            <th></th>
            <th class="col-dim">幅</th>
            <th class="col-dim">奥行</th>
            <th class="col-dim">厚み</th>
            <th class="col-dim">枚数</th>
            <th class="col-dim" style="border-left:2px solid #8b6f47;">幅</th>
            <th class="col-dim">奥行</th>
            <th class="col-dim">厚み</th>
            <th class="col-dim">枚数</th>
            <th class="col-dim" style="border-left:2px solid #8b6f47;">幅</th>
            <th class="col-dim">奥行</th>
            <th class="col-dim">厚み</th>
            <th class="col-dim">枚数</th>
            <th></th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody id="parts-tbody"></tbody>
      </table>
    </div>

    <div class="memo-area no-print">
      <label>製品メモ</label>
      <textarea id="product-memo" placeholder="全体的な備考・特記事項..." oninput="saveMemo()"></textarea>
    </div>
    <div class="memo-area" id="print-memo" style="display:none;"></div>
  </div>
</div>

<!-- 製品追加モーダル -->
<div class="modal-overlay" id="modal-product">
  <div class="modal">
    <h3>製品を追加</h3>
    <div class="form-group">
      <label>顧客名・製品名</label>
      <input type="text" id="new-product-name" placeholder="例：八木様 100グレード">
    </div>
    <div class="form-group">
      <label>グレード / 材種など</label>
      <input type="text" id="new-product-meta" placeholder="例：実板 全てレッドオーク">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-product')">キャンセル</button>
      <button class="btn btn-primary" onclick="addProduct()">追加</button>
    </div>
  </div>
</div>

<!-- パーツ追加モーダル -->
<div class="modal-overlay" id="modal-part">
  <div class="modal">
    <h3>パーツを追加</h3>
    <div class="form-group">
      <label>パーツ名</label>
      <input type="text" id="new-part-name" placeholder="例：天板、地板、膳引き…">
    </div>
    <div style="font-size:0.85rem; color:#888; margin-bottom:8px;">寸法は後から表で入力できます</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-part')">キャンセル</button>
      <button class="btn btn-primary" onclick="addPart()">追加</button>
    </div>
  </div>
</div>

<script>
// --- データ管理 ---
const STORE_KEY = 'butudan_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { products: [] }; }
  catch { return { products: [] }; }
}
function save(data) { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

let db = load();
let currentProductId = null;

// --- 製品一覧 ---
function showList() {
  db = load();
  document.getElementById('page-list').classList.add('active');
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('breadcrumb').textContent = '';
  renderProductGrid();
}

function renderProductGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';

  db.products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `<h3>${esc(p.name)}</h3><div class="meta">${esc(p.meta || '')}<br>${p.parts.length}パーツ</div>`;
    card.onclick = () => showDetail(p.id);
    grid.appendChild(card);
  });

  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = `<span style="font-size:1.4rem;">＋</span> 製品を追加`;
  addCard.onclick = () => document.getElementById('modal-product').classList.add('open');
  grid.appendChild(addCard);
}

function addProduct() {
  const name = document.getElementById('new-product-name').value.trim();
  if (!name) return alert('製品名を入力してください');
  const meta = document.getElementById('new-product-meta').value.trim();
  const id = Date.now().toString();
  db.products.push({ id, name, meta, parts: [], memo: '' });
  save(db);
  closeModal('modal-product');
  document.getElementById('new-product-name').value = '';
  document.getElementById('new-product-meta').value = '';
  showDetail(id);
}

function deleteProduct() {
  if (!confirm('この製品を削除しますか？')) return;
  db.products = db.products.filter(p => p.id !== currentProductId);
  save(db);
  showList();
}

// --- 製品詳細 ---
function showDetail(id) {
  currentProductId = id;
  db = load();
  const p = getProduct();
  document.getElementById('page-list').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('detail-title').textContent = p.name + (p.meta ? '　' + p.meta : '');
  document.getElementById('print-title').textContent = p.name + (p.meta ? '　' + p.meta : '');
  document.getElementById('breadcrumb').textContent = p.name;
  document.getElementById('product-memo').value = p.memo || '';
  renderParts();
}

function getProduct() {
  return db.products.find(p => p.id === currentProductId);
}

function renderParts() {
  const tbody = document.getElementById('parts-tbody');
  tbody.innerHTML = '';
  const p = getProduct();
  p.parts.forEach((part, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-name">${esc(part.name)}</td>
      ${dimCells(part, 'std')}
      ${dimCells(part, 'moku')}
      ${dimCells(part, 'rough')}
      <td><input type="text" value="${esc(part.note||'')}" placeholder="備考" onchange="updateField(${idx},'note',this.value)"></td>
      <td class="no-print">
        <button class="btn btn-ghost" style="padding:4px 8px;font-size:0.8rem;" onclick="deletePart(${idx})">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function dimCells(part, key) {
  const d = part[key] || {};
  return ['w','d','t','n'].map((f,i) => {
    const idx = part._idx !== undefined ? part._idx : -1;
    return `<td class="col-dim" style="${i===0?'border-left:2px solid #e0d0c0;':''}">
      <input type="number" value="${d[f]||''}" placeholder="-"
        onchange="updateDim(${part._idx},'${key}','${f}',this.value)">
    </td>`;
  }).join('');
}

function renderParts() {
  const tbody = document.getElementById('parts-tbody');
  tbody.innerHTML = '';
  const p = getProduct();
  p.parts.forEach((part, idx) => {
    const tr = document.createElement('tr');
    const std = part.std || {};
    const moku = part.moku || {};
    const rough = part.rough || {};
    tr.innerHTML = `
      <td class="col-name">${esc(part.name)}</td>
      <td class="col-dim" style="border-left:2px solid #e0d0c0;"><input type="number" value="${std.w||''}" placeholder="-" onchange="updateDim(${idx},'std','w',this.value)"></td>
      <td class="col-dim"><input type="number" value="${std.d||''}" placeholder="-" onchange="updateDim(${idx},'std','d',this.value)"></td>
      <td class="col-dim"><input type="number" value="${std.t||''}" placeholder="-" onchange="updateDim(${idx},'std','t',this.value)"></td>
      <td class="col-dim"><input type="number" value="${std.n||''}" placeholder="-" onchange="updateDim(${idx},'std','n',this.value)"></td>
      <td class="col-dim" style="border-left:2px solid #e0d0c0;"><input type="number" value="${moku.w||''}" placeholder="-" onchange="updateDim(${idx},'moku','w',this.value)"></td>
      <td class="col-dim"><input type="number" value="${moku.d||''}" placeholder="-" onchange="updateDim(${idx},'moku','d',this.value)"></td>
      <td class="col-dim"><input type="number" value="${moku.t||''}" placeholder="-" onchange="updateDim(${idx},'moku','t',this.value)"></td>
      <td class="col-dim"><input type="number" value="${moku.n||''}" placeholder="-" onchange="updateDim(${idx},'moku','n',this.value)"></td>
      <td class="col-dim" style="border-left:2px solid #e0d0c0;"><input type="number" value="${rough.w||''}" placeholder="-" onchange="updateDim(${idx},'rough','w',this.value)"></td>
      <td class="col-dim"><input type="number" value="${rough.d||''}" placeholder="-" onchange="updateDim(${idx},'rough','d',this.value)"></td>
      <td class="col-dim"><input type="number" value="${rough.t||''}" placeholder="-" onchange="updateDim(${idx},'rough','t',this.value)"></td>
      <td class="col-dim"><input type="number" value="${rough.n||''}" placeholder="-" onchange="updateDim(${idx},'rough','n',this.value)"></td>
      <td><input type="text" value="${esc(part.note||'')}" placeholder="備考" onchange="updateField(${idx},'note',this.value)"></td>
      <td class="no-print" style="white-space:nowrap;">
        <button class="btn btn-ghost" style="padding:4px 8px;font-size:0.8rem;" onclick="deletePart(${idx})">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function updateDim(idx, section, field, value) {
  const p = getProduct();
  if (!p.parts[idx][section]) p.parts[idx][section] = {};
  p.parts[idx][section][field] = value === '' ? null : Number(value);
  save(db);
}

function updateField(idx, field, value) {
  const p = getProduct();
  p.parts[idx][field] = value;
  save(db);
}

function addPart() {
  const name = document.getElementById('new-part-name').value.trim();
  if (!name) return alert('パーツ名を入力してください');
  const p = getProduct();
  p.parts.push({ name, std: {}, moku: {}, rough: {}, note: '' });
  save(db);
  closeModal('modal-part');
  document.getElementById('new-part-name').value = '';
  renderParts();
}

function deletePart(idx) {
  if (!confirm('このパーツを削除しますか？')) return;
  const p = getProduct();
  p.parts.splice(idx, 1);
  save(db);
  renderParts();
}

function saveMemo() {
  const p = getProduct();
  p.memo = document.getElementById('product-memo').value;
  save(db);
}

// --- PDF出力 ---
function printPDF() {
  const memo = document.getElementById('product-memo').value;
  const printMemo = document.getElementById('print-memo');
  if (memo) {
    printMemo.style.display = 'block';
    printMemo.innerHTML = `<label>備考</label><div style="white-space:pre-wrap;font-size:0.88rem;">${esc(memo)}</div>`;
  }
  window.print();
  printMemo.style.display = 'none';
}

// --- モーダル ---
function openAddPartModal() {
  document.getElementById('modal-part').classList.add('open');
  setTimeout(() => document.getElementById('new-part-name').focus(), 100);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// クリック外でモーダルを閉じる
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// Enterキーで確定
document.getElementById('new-product-name').addEventListener('keydown', e => { if (e.key === 'Enter') addProduct(); });
document.getElementById('new-part-name').addEventListener('keydown', e => { if (e.key === 'Enter') addPart(); });

// --- ユーティリティ ---
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初期表示
showList();
</script>
</body>
</html>
