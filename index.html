<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仏壇部材管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Meiryo', sans-serif; background: #f5f0eb; color: #333; }

  header {
    background: #4a3728;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.2rem; }
  header .breadcrumb { font-size: 0.85rem; opacity: 0.8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

  .page { display: none; }
  .page.active { display: block; }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .product-card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    cursor: pointer;
    border-left: 4px solid #8b6f47;
    transition: transform 0.15s;
  }
  .product-card:hover { transform: translateY(-2px); }
  .product-card h3 { font-size: 1rem; margin-bottom: 4px; }
  .product-card .meta { font-size: 0.8rem; color: #888; }

  .add-card {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
    border: 2px dashed #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 0.95rem;
    gap: 8px;
    transition: border-color 0.15s;
  }
  .add-card:hover { border-color: #8b6f47; color: #8b6f47; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-primary { background: #8b6f47; color: #fff; }
  .btn-primary:hover { background: #6e5538; }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-danger:hover { background: #962d22; }
  .btn-ghost { background: transparent; border: 1px solid #ccc; color: #555; }
  .btn-ghost:hover { background: #f0f0f0; }
  .btn-pdf { background: #2c6fad; color: #fff; }
  .btn-pdf:hover { background: #245a8e; }

  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar h2 { flex: 1; font-size: 1.1rem; }

  .parts-table-wrap { overflow-x: auto; margin-top: 4px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    font-size: 0.88rem;
  }
  thead tr { background: #4a3728; color: #fff; }
  th, td { padding: 8px 10px; border-bottom: 1px solid #eee; white-space: nowrap; }
  td { vertical-align: middle; }
  tbody tr:hover { background: #fdf8f4; }
  tbody tr:last-child td { border-bottom: none; }

  .col-name { min-width: 90px; font-weight: bold; }
  .col-dim { min-width: 60px; text-align: center; }
  .col-note { min-width: 120px; }

  input[type="text"], input[type="number"], textarea, select {
    font-family: inherit;
    font-size: 0.88rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 4px 6px;
    width: 100%;
  }
  input[type="number"] { width: 70px; }
  textarea { resize: vertical; min-height: 40px; }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    width: 400px;
    max-width: 95vw;
  }
  .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .memo-area {
    background: #fff;
    border-radius: 8px;
    padding: 12px 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    margin-top: 16px;
  }
  .memo-area label { font-size: 0.85rem; color: #666; display: block; margin-bottom: 6px; }
  .memo-area textarea { width: 100%; height: 60px; }

  @media print {
    header, .toolbar .btn, .no-print { display: none !important; }
    body { background: #fff; }
    .container { padding: 0; max-width: 100%; }
    table { box-shadow: none; font-size: 0.8rem; }
    th, td { padding: 5px 7px; }
    .memo-area { box-shadow: none; border: 1px solid #ccc; }
    .print-title { display: block !important; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
  }
  .print-title { display: none; }
</style>
</head>
<body>

<header>
  <h1>仏壇部材管理</h1>
  <span class="breadcrumb" id="breadcrumb"></span>
</header>

<!-- 製品一覧ページ -->
<div class="page active" id="page-list">
  <div class="container">
    <div class="toolbar" style="margin-top:16px;">
      <h2>製品一覧</h2>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </div>
</div>

<!-- 製品詳細ページ -->
<div class="page" id="page-detail">
  <div class="container">
    <div class="print-title" id="print-title"></div>
    <div class="toolbar no-print">
      <button class="btn btn-ghost" data-action="back">← 一覧に戻る</button>
      <h2 id="detail-title"></h2>
      <button class="btn btn-primary" data-action="add-part">＋ パーツ追加</button>
      <button class="btn btn-pdf" data-action="pdf">PDF出力</button>
      <button class="btn btn-danger" data-action="del-product">製品削除</button>
    </div>

    <div class="parts-table-wrap">
      <table id="parts-table">
        <thead>
          <tr>
            <th class="col-name">パーツ名</th>
            <th colspan="4" style="text-align:center; border-left:2px solid #6e5538;">正規寸法</th>
            <th colspan="4" style="text-align:center; border-left:2px solid #6e5538;">杢貼り用寸法</th>
            <th colspan="4" style="text-align:center; border-left:2px solid #6e5538;">荒取り寸法</th>
            <th class="col-note" style="border-left:2px solid #6e5538;">備考</th>
            <th class="no-print"></th>
          </tr>
          <tr style="background:#6e5538;">
            <th></th>
            <th class="col-dim">幅</th>
            <th class="col-dim">奥行</th>
            <th class="col-dim">厚み</th>
            <th class="col-dim">枚数</th>
            <th class="col-dim" style="border-left:2px solid #8b6f47;">幅</th>
            <th class="col-dim">奥行</th>
            <th class="col-dim">厚み</th>
            <th class="col-dim">枚数</th>
            <th class="col-dim" style="border-left:2px solid #8b6f47;">幅</th>
            <th class="col-dim">奥行</th>
            <th class="col-dim">厚み</th>
            <th class="col-dim">枚数</th>
            <th></th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody id="parts-tbody"></tbody>
      </table>
    </div>

    <div class="memo-area no-print">
      <label>製品メモ</label>
      <textarea id="product-memo" placeholder="全体的な備考・特記事項..."></textarea>
    </div>
    <div class="memo-area" id="print-memo" style="display:none;"></div>
  </div>
</div>

<!-- 製品追加モーダル -->
<div class="modal-overlay" id="modal-product">
  <div class="modal">
    <h3>製品を追加</h3>
    <div class="form-group">
      <label>顧客名・製品名</label>
      <input type="text" id="new-product-name" placeholder="例：八木様 100グレード">
    </div>
    <div class="form-group">
      <label>グレード / 材種など</label>
      <input type="text" id="new-product-meta" placeholder="例：実板 全てレッドオーク">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="modal-product">キャンセル</button>
      <button class="btn btn-primary" data-action="save-product">追加</button>
    </div>
  </div>
</div>

<!-- パーツ追加モーダル -->
<div class="modal-overlay" id="modal-part">
  <div class="modal">
    <h3>パーツを追加</h3>
    <div class="form-group">
      <label>パーツ名</label>
      <input type="text" id="new-part-name" placeholder="例：天板、地板、膳引き…">
    </div>
    <div style="font-size:0.85rem; color:#888; margin-bottom:8px;">寸法は後から表で入力できます</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-close="modal-part">キャンセル</button>
      <button class="btn btn-primary" data-action="save-part">追加</button>
    </div>
  </div>
</div>

<script>
// --- データ管理 ---
var STORE_KEY = 'butudan_v1';

// localStorageが使えるか判定（data: URLのプレビュー等では無効）
var STORAGE_OK = (function() {
  try {
    var k = '__t';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch (e) { return false; }
})();

var memoryStore = null; // フォールバック用（保存はされない）

function load() {
  if (!STORAGE_OK) return memoryStore || { products: [] };
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { products: [] }; }
  catch (e) { return { products: [] }; }
}
function save(data) {
  if (!STORAGE_OK) { memoryStore = data; return; }
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
  catch (e) { alert('保存に失敗しました: ' + e.message); }
}

var db = load();
var currentProductId = null;

function $(id) { return document.getElementById(id); }
function getProduct() { return db.products.find(function(p){ return p.id === currentProductId; }); }
function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

// --- 製品一覧 ---
function showList() {
  db = load();
  $('page-list').classList.add('active');
  $('page-detail').classList.remove('active');
  $('breadcrumb').textContent = '';
  renderProductGrid();
}

function renderProductGrid() {
  var grid = $('product-grid');
  grid.innerHTML = '';

  db.products.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = '<h3>' + esc(p.name) + '</h3><div class="meta">' +
      esc(p.meta || '') + '<br>' + p.parts.length + 'パーツ</div>';
    card.addEventListener('click', function(){ showDetail(p.id); });
    grid.appendChild(card);
  });

  var addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = '<span style="font-size:1.4rem;">＋</span> 製品を追加';
  addCard.addEventListener('click', function(){
    $('new-product-name').value = '';
    $('new-product-meta').value = '';
    openModal('modal-product');
    setTimeout(function(){ $('new-product-name').focus(); }, 50);
  });
  grid.appendChild(addCard);
}

function addProduct() {
  var name = $('new-product-name').value.trim();
  if (!name) { alert('製品名を入力してください'); return; }
  var meta = $('new-product-meta').value.trim();
  var id = Date.now().toString();
  db.products.push({ id: id, name: name, meta: meta, parts: [], memo: '' });
  save(db);
  closeModal('modal-product');
  showDetail(id);
}

function deleteProduct() {
  if (!confirm('この製品を削除しますか？')) return;
  db.products = db.products.filter(function(p){ return p.id !== currentProductId; });
  save(db);
  showList();
}

// --- 製品詳細 ---
function showDetail(id) {
  currentProductId = id;
  db = load();
  var p = getProduct();
  if (!p) { showList(); return; }
  $('page-list').classList.remove('active');
  $('page-detail').classList.add('active');
  var title = p.name + (p.meta ? '　' + p.meta : '');
  $('detail-title').textContent = title;
  $('print-title').textContent = title;
  $('breadcrumb').textContent = p.name;
  $('product-memo').value = p.memo || '';
  renderParts();
}

var SECTIONS = ['std', 'moku', 'rough'];
var FIELDS = ['w', 'd', 't', 'n'];

function renderParts() {
  var tbody = $('parts-tbody');
  tbody.innerHTML = '';
  var p = getProduct();

  p.parts.forEach(function(part, idx) {
    var tr = document.createElement('tr');

    var html = '<td class="col-name">' + esc(part.name) + '</td>';
    SECTIONS.forEach(function(sec) {
      var d = part[sec] || {};
      FIELDS.forEach(function(f, i) {
        var border = i === 0 ? ' style="border-left:2px solid #e0d0c0;"' : '';
        html += '<td class="col-dim"' + border + '>' +
          '<input type="number" data-idx="' + idx + '" data-sec="' + sec + '" data-field="' + f + '" ' +
          'value="' + (d[f] != null ? d[f] : '') + '" placeholder="-"></td>';
      });
    });
    html += '<td><input type="text" data-idx="' + idx + '" data-note="1" value="' +
      esc(part.note || '') + '" placeholder="備考"></td>';
    html += '<td class="no-print"><button class="btn btn-ghost" data-del="' + idx +
      '" style="padding:4px 8px;font-size:0.8rem;">削除</button></td>';

    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
}

function addPart() {
  var name = $('new-part-name').value.trim();
  if (!name) { alert('パーツ名を入力してください'); return; }
  var p = getProduct();
  p.parts.push({ name: name, std: {}, moku: {}, rough: {}, note: '' });
  save(db);
  closeModal('modal-part');
  renderParts();
}

function deletePart(idx) {
  if (!confirm('このパーツを削除しますか？')) return;
  var p = getProduct();
  p.parts.splice(idx, 1);
  save(db);
  renderParts();
}

// --- PDF出力 ---
function printPDF() {
  var memo = $('product-memo').value;
  var printMemo = $('print-memo');
  if (memo) {
    printMemo.style.display = 'block';
    printMemo.innerHTML = '<label>備考</label><div style="white-space:pre-wrap;font-size:0.88rem;">' +
      esc(memo) + '</div>';
  }
  window.print();
  printMemo.style.display = 'none';
}

// --- イベント登録（イベント委譲） ---
// ツールバー・モーダルのボタン
document.addEventListener('click', function(e) {
  var t = e.target.closest('[data-action], [data-close], [data-del]');
  if (!t) return;

  if (t.hasAttribute('data-close')) { closeModal(t.getAttribute('data-close')); return; }
  if (t.hasAttribute('data-del'))   { deletePart(Number(t.getAttribute('data-del'))); return; }

  switch (t.getAttribute('data-action')) {
    case 'back':         showList(); break;
    case 'add-part':
      $('new-part-name').value = '';
      openModal('modal-part');
      setTimeout(function(){ $('new-part-name').focus(); }, 50);
      break;
    case 'pdf':          printPDF(); break;
    case 'del-product':  deleteProduct(); break;
    case 'save-product': addProduct(); break;
    case 'save-part':    addPart(); break;
  }
});

// 寸法・備考の入力（イベント委譲）
$('parts-tbody').addEventListener('change', function(e) {
  var el = e.target;
  if (el.tagName !== 'INPUT') return;
  var idx = Number(el.getAttribute('data-idx'));
  var p = getProduct();
  if (!p || !p.parts[idx]) return;

  if (el.hasAttribute('data-note')) {
    p.parts[idx].note = el.value;
  } else {
    var sec = el.getAttribute('data-sec');
    var field = el.getAttribute('data-field');
    if (!p.parts[idx][sec]) p.parts[idx][sec] = {};
    p.parts[idx][sec][field] = el.value === '' ? null : Number(el.value);
  }
  save(db);
});

// メモ保存
$('product-memo').addEventListener('input', function() {
  var p = getProduct();
  if (p) { p.memo = this.value; save(db); }
});

// モーダル背景クリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(function(el) {
  el.addEventListener('click', function(e) { if (e.target === el) el.classList.remove('open'); });
});

// Enterキーで確定
$('new-product-name').addEventListener('keydown', function(e){ if (e.key === 'Enter') addProduct(); });
$('new-product-meta').addEventListener('keydown', function(e){ if (e.key === 'Enter') addProduct(); });
$('new-part-name').addEventListener('keydown', function(e){ if (e.key === 'Enter') addPart(); });

// 初期表示
showList();
</script>
</body>
</html>
